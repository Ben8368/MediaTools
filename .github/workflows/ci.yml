name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check backend cli core modules adapters
      - name: Black check
        run: black --check backend cli core modules adapters
      - name: MyPy type check
        run: mypy backend cli core modules --ignore-missing-imports || true
      - name: Pytest
        run: pytest --cov=. --cov-fail-under=30 --ignore=vendor --ignore=frontend --ignore=scripts -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
